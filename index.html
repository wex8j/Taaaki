<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#fe2c55">
    <title>TT Save - Ultra HD</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --red: #fe2c55; --cyan: #25f4ee; --card: #121214; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Tajawal', sans-serif; }
        body { background: #000; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .app { width: 100%; max-width: 400px; background: var(--card); border-radius: 32px; padding: 30px; border: 1px solid #222; text-align: center; }
        .logo { font-size: 30px; font-weight: 900; margin-bottom: 25px; background: linear-gradient(to right, var(--red), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { width: 100%; background: #1c1c1e; border: 1.5px solid #333; border-radius: 16px; padding: 16px; color: #fff; outline: none; margin-bottom: 15px; text-align: center; }
        input:focus { border-color: var(--red); }
        .btn { width: 100%; background: var(--red); color: #fff; border: none; border-radius: 16px; padding: 18px; font-weight: 700; font-size: 16px; cursor: pointer; }
        #result { display: none; margin-top: 25px; animation: scaleUp 0.4s ease; }
        .preview { width: 100%; border-radius: 20px; border: 2px solid #333; margin-bottom: 15px; }
        .dl-btn { width: 100%; background: #fff; color: #000; text-decoration: none; padding: 18px; border-radius: 16px; font-weight: 900; font-size: 17px; display: block; }
        .status { display: none; margin: 15px 0; color: var(--cyan); font-size: 13px; }
        @keyframes scaleUp { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="app">
    <div class="logo">TT SAVE PRO</div>
    <input type="url" id="link" placeholder="الصق الرابط هنا...">
    <button class="btn" id="go" onclick="downloadLogic()">استخراج الفيديو HD</button>
    
    <div class="status" id="state">⏳ جاري المحاولة (سيرفر 1)...</div>

    <div id="result">
        <img id="cover" class="preview">
        <a id="download" class="dl-btn" href="#">📥 حفظ الفيديو في الاستوديو</a>
        <p style="font-size: 10px; color: #666; margin-top: 15px;">في حال فتح الفيديو بصفحة سودة، اضغط مطولاً واختَر "حفظ الفيديو"</p>
    </div>
</div>

<script>
let videoUrl = "";

async function downloadLogic() {
    const input = document.getElementById('link').value.trim();
    if(!input) return;

    const state = document.getElementById('state');
    const result = document.getElementById('result');
    const go = document.getElementById('go');

    go.disabled = true;
    state.style.display = 'block';
    result.style.display = 'none';

    // محاولة 1: السيرفر الأساسي
    try {
        state.innerText = "⏳ جاري الاتصال بالسيرفر الأساسي...";
        const res = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(input)}&hd=1`);
        const data = await res.json();
        
        if(data.code === 0) {
            showResult(data.data);
            return;
        }
        throw new Error("S1 Busy");
    } catch (e) {
        // محاولة 2: إذا السيرفر الأول مشغول، نجرب السيرفر الاحتياطي
        try {
            state.innerText = "⚠️ السيرفر الأول مشغول، جاري تجربة سيرفر 2...";
            const res2 = await fetch(`https://api.tikwm.com/api/?url=${encodeURIComponent(input)}`);
            const data2 = await res2.json();
            if(data2.code === 0) {
                showResult(data2.data);
                return;
            }
        } catch (e2) {
            alert("للأسف كل السيرفرات مشغولة حالياً، جرب بعد دقيقة وحدة.");
        }
    } finally {
        go.disabled = false;
        state.style.display = 'none';
    }
}

function showResult(data) {
    videoUrl = "https://www.tikwm.com" + (data.hdplay || data.play);
    document.getElementById('cover').src = data.cover;
    const dlLink = document.getElementById('download');
    
    // السر هنا للآيفون والأندرويد: نفتح الرابط بطريقة التحميل
    dlLink.onclick = (e) => {
        e.preventDefault();
        forceSave(videoUrl);
    };
    
    document.getElementById('result').style.display = 'block';
}

// وظيفة إجبار الحفظ لمنع "تحميل الصوت فقط"
async function forceSave(url) {
    const state = document.getElementById('state');
    state.style.display = 'block';
    state.innerText = "🚀 جاري تحويل الفيديو للجهاز...";
    
    try {
        const response = await fetch(url);
        const blob = await response.blob();
        const blobUrl = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = `TT-Video-${Date.now()}.mp4`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(blobUrl);
        state.innerText = "✅ اكتمل التحميل!";
    } catch (e) {
        // إذا فشل الـ Blob (بسبب الحماية)، نفتح الرابط مباشرة
        window.location.href = url;
    }
}

// دعم المشاركة المباشرة
window.onload = () => {
    const p = new URLSearchParams(window.location.search);
    const s = p.get('text') || p.get('url');
    if(s) {
        const m = s.match(/https?:\/\/[^\s]+/);
        if(m) {
            document.getElementById('link').value = m[0];
            downloadLogic();
        }
    }
};
</script>

</body>
</html>
