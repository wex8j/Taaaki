<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ff0050">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="3TX">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>3TX | التحميل الذكي</title>
    <style>
        :root { --pink: #ff0050; --bg: #0a0a0a; --card: #161616; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: var(--card); padding: 35px 25px; border-radius: 30px; width: 95%; max-width: 420px; text-align: center; border: 2px solid var(--pink); box-shadow: 0 0 20px rgba(255, 0, 80, 0.3); }
        h1 { color: var(--pink); font-size: 60px; margin: 0; font-style: italic; font-weight: 900; text-shadow: 2px 2px #00f2ea; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 18px; border-radius: 15px; border: 1px solid #333; background: #222; color: white; margin-bottom: 15px; box-sizing: border-box; outline: none; text-align: center; font-size: 16px; }
        .btn { background: var(--pink); color: white; padding: 16px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        #result { display: none; margin-top: 25px; }
        .loader { border: 4px solid #222; border-top: 4px solid var(--pink); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-msg { font-size: 12px; color: #00f2ea; margin-top: 10px; }
        
        /* إضافة بسيطة لرسالة المشاركة */
        .share-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff0050;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            display: none;
            z-index: 1000;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>3TX</h1>
    <p>تحميل تيك توك (أندرويد + أيفون)</p>
    
    <input type="text" id="urlInput" placeholder="الصق الرابط هنا...">
    <button class="btn" id="fetchBtn" onclick="getVideo()">جلب الفيديو</button>
    
    <div class="loader" id="loader"></div>

    <div id="result">
        <button class="btn" id="dl-btn" style="background: #00f2ea; color: black;" onclick="handleDownload()">تنزيل الآن</button>
        <div id="os-msg" class="status-msg"></div>
    </div>
</div>

<div id="shareToast" class="share-toast">⚡ تم استقبال الرابط من تيك توك!</div>

<script>
    let currentVideoUrl = "";
    let isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

    // ========== الإضافة 1: استقبال الرابط من مشاركة تيك توك ==========
    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        const sharedText = params.get('text') || params.get('url');
        
        if (sharedText) {
            const link = sharedText.match(/https?:\/\/[^\s]+/);
            if (link && (link[0].includes('tiktok') || link[0].includes('vm.tiktok') || link[0].includes('vt.tiktok'))) {
                document.getElementById('urlInput').value = link[0];
                
                // إظهار رسالة
                const toast = document.getElementById('shareToast');
                toast.style.display = 'block';
                setTimeout(() => {
                    toast.style.display = 'none';
                }, 2000);
                
                // جلب الفيديو تلقائياً
                setTimeout(() => {
                    getVideo();
                }, 500);
            }
        }
        
        // ========== الإضافة 2: تسجيل Service Worker عشان يصير تطبيق ==========
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log('Service Worker registered');
            }).catch(err => {
                console.log('SW failed:', err);
            });
        }
    };

    // ========== كودك الأصلي ما غيرت فيه شي ==========
    async function getVideo() {
        const inputField = document.getElementById('urlInput');
        const url = inputField.value;
        if (!url) return alert("حط الرابط أولاً!");

        document.getElementById('loader').style.display = 'block';
        document.getElementById('fetchBtn').disabled = true;
        document.getElementById('result').style.display = 'none';

        try {
            const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
            const json = await response.json();

            if (json.code === 0) {
                currentVideoUrl = json.data.play;
                
                // تم مسح الرابط من الخانة فوراً
                inputField.value = ""; 
                
                document.getElementById('result').style.display = 'block';
                document.getElementById('os-msg').innerText = isIOS ? "تم التجهيز لنظام iPhone" : "تم التجهيز لنظام Android";
            } else {
                alert("تأكد من الرابط!");
            }
        } catch (err) {
            alert("خطأ في الاتصال.");
        } finally {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('fetchBtn').disabled = false;
        }
    }

    async function handleDownload() {
        if (!currentVideoUrl) return;

        if (isIOS) {
            // --- برمجة الأيفون (Blob) ---
            try {
                const res = await fetch(currentVideoUrl);
                const blob = await res.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = "3TX_Video.mp4";
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(blobUrl);
            } catch (e) {
                window.open(currentVideoUrl, '_blank');
            }
        } else {
            // --- برمجة الأندرويد (Direct Link) ---
            const a = document.createElement('a');
            a.href = currentVideoUrl;
            const downloadUrl = currentVideoUrl + (currentVideoUrl.includes('?') ? '&' : '?') + 'download=1';
            a.href = downloadUrl;
            a.setAttribute('download', '3TX_Video.mp4');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    }
</script>

</body>
</html>
