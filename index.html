<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TT Save">
<link rel="manifest" href="manifest.json">
<title>TT Save - تحميل تيك توك</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,0.07);
    --red: #ff2d55;
    --cyan: #00f2ea;
    --text: #f0f0f5;
    --muted: rgba(240,240,245,0.45);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }
  /* الخلفية المتدرجة */
  body::before {
    content:''; position:fixed; inset:0;
    background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(255,45,85,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 50% 35% at 80% 90%, rgba(0,242,234,0.10) 0%, transparent 60%);
    pointer-events:none; z-index:0;
  }
  .container {
    position:relative; z-index:1;
    max-width:480px; margin:0 auto;
    padding:20px 16px 40px;
    display:flex; flex-direction:column; gap:16px;
  }

  header { text-align:center; padding:20px 0; }
  .logo-icon {
    width:60px; height:60px; border-radius:20px;
    background:linear-gradient(135deg,#ff2d55,#00f2ea);
    display:flex; align-items:center; justify-content:center;
    font-size:30px; margin:0 auto 10px;
    box-shadow:0 0 30px rgba(255,45,85,0.3);
  }
  .logo-text { font-size:28px; font-weight:900; letter-spacing:-1px; }
  .logo-text span:first-child{color:var(--red);}
  .logo-text span:last-child{color:var(--cyan);}

  /* تنبيه المشاركة */
  #shared-toast {
    display:none; background:rgba(0,242,234,0.15);
    border:1px solid var(--cyan); border-radius:12px;
    padding:12px; margin-bottom:10px; text-align:center;
    animation: fadeIn 0.5s ease;
  }
  #shared-toast.show { display:block; }

  /* مدخلات الرابط */
  .input-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:20px; padding:20px;
  }
  .input-wrap { display:flex; gap:8px; margin-bottom:12px; }
  .url-input {
    flex:1; background:var(--surface2); border:1px solid var(--border);
    border-radius:12px; padding:12px; color:#fff; font-family:inherit; outline:none;
  }
  .paste-btn {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:12px; padding:0 15px; color:var(--cyan); cursor:pointer;
  }
  .fetch-btn {
    width:100%; background:linear-gradient(135deg,var(--red),var(--cyan));
    border:none; border-radius:12px; padding:15px; color:#fff;
    font-weight:700; font-size:16px; cursor:pointer;
  }

  /* النتائج */
  .result-card {
    display:none; background:var(--surface); border:1px solid var(--border);
    border-radius:20px; overflow:hidden; animation: slideUp 0.4s ease;
  }
  .result-card.show { display:block; }
  .video-preview { position:relative; width:100%; background:#000; }
  .video-thumb { width:100%; display:block; aspect-ratio:9/16; object-fit:cover; max-height:400px; }
  .dl-section { padding:15px; }
  .dl-btn {
    width:100%; background:rgba(255,45,85,0.1); border:1px solid var(--red);
    color:#fff; padding:15px; border-radius:12px; font-weight:700; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:10px;
  }

  /* Loading */
  .loading { display:none; text-align:center; padding:20px; }
  .loading.show { display:block; }
  .loader {
    width:30px; height:30px; border:3px solid var(--surface2);
    border-top-color:var(--red); border-radius:50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo-icon">🎬</div>
    <div class="logo-text"><span>TT</span><span>Save</span></div>
    <p style="color:var(--muted); font-size:12px; margin-top:5px;">تحميل فيديو تيك توك بدون علامة مائية</p>
  </header>

  <div id="shared-toast">⚡ تم استلام الرابط.. جاري التحميل تلقائياً</div>

  <div class="input-card">
    <div class="input-wrap">
      <input type="url" id="urlInput" class="url-input" placeholder="الصق رابط تيك توك هنا...">
      <button class="paste-btn" onclick="pasteURL()">لصق</button>
    </div>
    <button class="fetch-btn" id="fetchBtn" onclick="fetchVideo()">جلب الفيديو</button>
  </div>

  <div class="loading" id="loading">
    <div class="loader"></div>
    <p>لحظة واحدة...</p>
  </div>

  <div class="result-card" id="resultCard">
    <div class="video-preview">
      <img class="video-thumb" id="thumb" src="">
      <div style="position:absolute; top:10px; right:10px; background:var(--red); padding:4px 8px; border-radius:6px; font-size:10px; font-weight:700;">بدون علامة ✓</div>
    </div>
    <div style="padding:15px; border-bottom:1px solid var(--border);">
       <p id="videoTitle" style="font-size:13px; color:var(--muted);"></p>
    </div>
    <div class="dl-section">
      <button class="dl-btn" onclick="doDownload()">
        <span>⬇️</span> تحميل الفيديو بجودة HD
      </button>
    </div>
  </div>
</div>

<script>
let videoURL = "";

// 1. كود تسجيل الـ Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

// 2. كود استقبال المشاركة (Share Target)
window.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const sharedText = params.get('text') || params.get('url');
  
  if (sharedText) {
    // استخراج الرابط من النص المشترك
    const match = sharedText.match(/https?:\/\/[^\s]+/);
    if (match) {
      document.getElementById('urlInput').value = match[0];
      document.getElementById('shared-toast').classList.add('show');
      
      // تنظيف الرابط في المتصفح عشان ما يكرر الجلب
      window.history.replaceState({}, '', window.location.pathname);
      
      setTimeout(() => {
        document.getElementById('shared-toast').classList.remove('show');
        fetchVideo();
      }, 800);
    }
  }
});

// 3. وظائف التطبيق
async function pasteURL() {
  try {
    const text = await navigator.clipboard.readText();
    if(text) document.getElementById('urlInput').value = text;
  } catch(e) { document.getElementById('urlInput').focus(); }
}

async function fetchVideo() {
  const url = document.getElementById('urlInput').value.trim();
  if(!url) return;

  document.getElementById('loading').classList.add('show');
  document.getElementById('resultCard').classList.remove('show');

  try {
    const res = await fetch(`https://tikwm.com/api/?url=${encodeURIComponent(url)}&hd=1`);
    const json = await res.json();
    
    if(json.code === 0) {
      const data = json.data;
      videoURL = data.hdplay || data.play;
      document.getElementById('thumb').src = data.cover;
      document.getElementById('videoTitle').textContent = data.title || "فيديو تيك توك";
      document.getElementById('resultCard').classList.add('show');
    } else {
      alert("عذراً، الرابط غير صحيح أو الفيديو خاص");
    }
  } catch(e) {
    alert("حدث خطأ في الاتصال بالسيرفر");
  } finally {
    document.getElementById('loading').classList.remove('show');
  }
}

function doDownload() {
  if(videoURL) {
    const a = document.createElement('a');
    a.href = videoURL;
    a.download = "ttsave_video.mp4";
    a.target = "_blank";
    a.click();
  }
}
</script>

</body>
</html>
