<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#fe2c55">
    <title>تحميل تيك توك - HD</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #fe2c55; --bg: #000; --card: #161618; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { width: 100%; max-width: 400px; background: var(--card); border-radius: 30px; padding: 30px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .logo { font-size: 32px; font-weight: 900; margin-bottom: 20px; color: var(--main); }
        input { width: 100%; background: #222; border: 2px solid #333; border-radius: 15px; padding: 15px; color: #fff; margin-bottom: 15px; outline: none; text-align: center; }
        input:focus { border-color: var(--main); }
        .btn { width: 100%; background: var(--main); color: #fff; border: none; border-radius: 15px; padding: 18px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        #result { display: none; margin-top: 25px; animation: fadeIn 0.5s; }
        .preview { width: 100%; border-radius: 20px; margin-bottom: 15px; max-height: 400px; object-fit: cover; }
        .dl-link, .copy-link { display: block; width: 100%; background: #fff; color: #000; text-decoration: none; padding: 18px; border-radius: 15px; font-weight: 900; font-size: 18px; margin-bottom: 10px; border: none; cursor: pointer; }
        .copy-link { background: #333; color: #fff; font-size: 14px; }
        .loader { display: none; color: #555; margin: 15px 0; font-size: 14px; }
        .try-again { background: #fe2c55; margin-top: 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #fe2c55; color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 14px; display: none; z-index: 1000; }
        .status-text { color: #fe2c55; font-size: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">TT Save HD</div>
    
    <input type="url" id="vUrl" placeholder="الصق الرابط هنا...">
    <button class="btn" id="btn" onclick="fetchVideo()">استخراج الفيديو HD</button>
    
    <div class="loader" id="loading">⏳ جاري جلب الفيديو...</div>
    <div class="status-text" id="statusText"></div>

    <div id="result">
        <video id="vPreview" class="preview" controls controlslist="nodownload"></video>
        <img id="vCover" class="preview" style="display: none;">
        <button class="dl-link" id="vDownload" onclick="downloadVideo()">📥 حفظ الفيديو HD</button>
        <button class="copy-link" id="copyLinkBtn" onclick="copyVideoLink()">📋 نسخ رابط التحميل</button>
        <p style="font-size: 11px; color: #666; margin-top: 15px;">
            💡 اذا ما نزل الفيديو: اضغط "نسخ الرابط" وافتحه في متصفح آخر
        </p>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
let currentVideoUrl = null;
let currentVideoData = null;

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.display = 'block';
    setTimeout(() => {
        toast.style.display = 'none';
    }, 2000);
}

async function fetchVideo() {
    const url = document.getElementById('vUrl').value.trim();
    if(!url) {
        showToast("⚠️ حط الرابط أولاً!");
        return;
    }
    
    if(!url.includes('tiktok.com') && !url.includes('vt.tiktok') && !url.includes('vm.tiktok')) {
        showToast("❌ هذا ليس رابط تيك توك!");
        return;
    }

    const btn = document.getElementById('btn');
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');
    const statusText = document.getElementById('statusText');

    btn.style.display = 'none';
    loading.style.display = 'block';
    result.style.display = 'none';
    statusText.style.display = 'block';
    statusText.innerHTML = '🔄 جاري الاتصال بالسيرفر...';

    try {
        // استخدم API مختلف
        const apiUrl = `https://tikwm.com/api/?url=${encodeURIComponent(url)}&hd=1`;
        statusText.innerHTML = '🔄 جلب معلومات الفيديو...';
        
        const response = await fetch(apiUrl);
        const data = await response.json();
        
        if(data.code === 0 && data.data) {
            const video = data.data;
            currentVideoData = video;
            
            // جيب رابط الفيديو
            let videoUrl = video.hdplay || video.play;
            if(videoUrl && !videoUrl.startsWith('http')) {
                videoUrl = 'https://tikwm.com' + videoUrl;
            }
            currentVideoUrl = videoUrl;
            
            // اعرض المعاينة
            const preview = document.getElementById('vPreview');
            const cover = document.getElementById('vCover');
            
            if(videoUrl) {
                preview.src = videoUrl;
                preview.style.display = 'block';
                cover.style.display = 'none';
            } else {
                cover.src = video.cover;
                cover.style.display = 'block';
                preview.style.display = 'none';
            }
            
            loading.style.display = 'none';
            result.style.display = 'block';
            btn.style.display = 'block';
            statusText.style.display = 'none';
            
            showToast("✅ جاهز! اضغط حفظ الفيديو");
        } else {
            throw new Error("ما حصلنا الفيديو");
        }
        
    } catch (e) {
        console.error(e);
        showToast("❌ السيرفر مشغول، جرب بعد دقيقة");
        loading.style.display = 'none';
        btn.style.display = 'block';
        statusText.style.display = 'none';
    }
}

function downloadVideo() {
    if(!currentVideoUrl) {
        showToast("❌ مافي رابط تحميل");
        return;
    }
    
    showToast("⏳ جاري تجهيز التحميل...");
    
    // طريقة 1: محاولة التحميل المباشر
    const a = document.createElement('a');
    a.href = currentVideoUrl;
    a.download = `tiktok_${Date.now()}.mp4`;
    a.target = '_blank';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    
    // طريقة 2: اذا ما اشتغل، افتح في تبويب جديد بعد ثانية
    setTimeout(() => {
        window.open(currentVideoUrl, '_blank');
        showToast("📱 اذا ما نزل الفيديو، اضغط نسخ الرابط");
    }, 1000);
}

function copyVideoLink() {
    if(!currentVideoUrl) {
        showToast("❌ مافي رابط للنسخ");
        return;
    }
    
    navigator.clipboard.writeText(currentVideoUrl).then(() => {
        showToast("📋 تم نسخ الرابط! افتحه في متصفح ثاني");
    }).catch(() => {
        showToast("❌ فشل النسخ");
    });
}

// لصق تلقائي
document.getElementById('vUrl').addEventListener('click', async function() {
    try {
        const text = await navigator.clipboard.readText();
        if(text && (text.includes('tiktok.com') || text.includes('vm.tiktok') || text.includes('vt.tiktok'))) {
            this.value = text;
            showToast("✅ تم لصق الرابط");
        }
    } catch(e) {}
});

// مشاركة من تيك توك
window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    const sharedText = params.get('text') || params.get('url');
    if(sharedText) {
        const match = sharedText.match(/https?:\/\/[^\s]+/);
        if(match) {
            document.getElementById('vUrl').value = match[0];
            setTimeout(() => fetchVideo(), 500);
        }
    }
};
</script>

</body>
</html>
